<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Профиль</title>
</head>
<body>
    <h1>Профиль</h1>

    <h3 id="user"></h3>
    <button onclick="logoutUser()">Выйти</button>


    <script>
    function loadUser() {
        fetch('/accounts/current_user/')
            .then(response => response.json())
            .then(data => {
                if (data.username) {
                    document.getElementById('user').textContent = 'Привет, ' + data.username;
                } else {
                    document.getElementById('user').textContent = 'Вы не вошли';
                }
            });
    }

    function logoutUser() {
        fetch('/accounts/logout/', {
            method: 'POST',
            headers: {
                'X-CSRFToken': getCookie('csrftoken')
            }
        })
        .then(response => response.json())
        .then(data => {
            alert(data.message);
            loadUser();
        });
    }

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.startsWith(name + '=')) {
                    cookieValue = cookie.substring(name.length + 1);
                    break;
                }
            }
        }
        return cookieValue;
    }

    loadUser();
    </script>

</body>
</html>
